<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | OfflineFaceAuth</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">
  <div class="auth-grid">
    <section class="brand-panel glass">
      <p class="eyebrow">ACCOUNT RECOVERY</p>
      <h1>Reset {{ 'Admin' if role == 'admin' else 'User' }} Password</h1>
      <p class="lead">Enter username and set a new password to restore access.</p>
    </section>

    <form class="auth-panel glass" method="post" action="/forgot-password">
      <h2>Forgot Password</h2>
      <p class="muted">Reset credentials for selected role.</p>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}

      <input type="hidden" name="role" value="{{ role }}">

      <label>Username</label>
      <input type="text" name="username" required>

      <label>New Password</label>
      <div class="password-wrap">
        <input type="password" id="newPassword" name="new_password" minlength="8" required>
        <button type="button" class="eye-btn" onclick="togglePassword('newPassword', this)">&#128065;</button>
      </div>

      <label>Confirm New Password</label>
      <div class="password-wrap">
        <input type="password" id="confirmNewPassword" name="confirm_password" minlength="8" required>
        <button type="button" class="eye-btn" onclick="togglePassword('confirmNewPassword', this)">&#128065;</button>
      </div>

      <button type="submit" class="btn-primary">Reset Password</button>

      <div class="role-switch">
        <a href="/forgot-password?role=admin" class="{{ 'active' if role == 'admin' else '' }}">Admin</a>
        <a href="/forgot-password?role=user" class="{{ 'active' if role == 'user' else '' }}">User</a>
      </div>

      <p class="auth-linkline"><a href="/login?role={{ role }}">Back to login</a></p>
    </form>
  </div>

  <script>
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.classList.add('active-eye');
      } else {
        input.type = 'password';
        btn.classList.remove('active-eye');
      }
    }
  </script>
</body>
</html>
